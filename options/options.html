<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Truthful Options</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    select, input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>Options</h1>

  <div class="form-group">
    <label for="provider">Analysis Provider:</label>
    <select id="provider">
      <option value="heuristics">Heuristics Only (No API)</option>
      <option value="groq">Groq API (Llama 3.3)</option>
      <option value="gemini">Google Gemini</option>
      <option value="ollama">Ollama (Local)</option>
    </select>
  </div>

  <div class="form-group" id="apiKeyGroup">
    <label for="apiKey">API Key:</label>
    <input type="password" id="apiKey" placeholder="Enter your API key">
  </div>

  <div class="form-group">
    <label for="threshold">Risk Threshold (0-100):</label>
    <input type="range" id="threshold" min="0" max="100" value="40">
    <span id="thresholdValue">40</span>
  </div>

  <div class="form-group">
    <label>
      <input type="checkbox" id="autoScan" checked>
      Auto-scan pages on load
    </label>
  </div>

  <button id="saveBtn">Save Settings</button>

  <div id="status" class="status"></div>

  <script src="options.js"></script>
</body>
</html>
